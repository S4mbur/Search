<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search Crawler - A powerful web crawling and search system with real-time monitoring">
  <title>Search Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/tokens.css">
  <link rel="stylesheet" href="/frontend/css/globals.css">
  <link rel="stylesheet" href="/frontend/css/components.css">
  <link rel="stylesheet" href="/frontend/css/pages.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
</head>
<body>
  <div id="app">
    <nav id="top-nav" class="top-nav">
      <div class="nav-brand">
        <div class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <span class="brand-text">Search Crawler</span>
      </div>
      <div class="nav-links">
        <a href="#/" class="nav-link active" data-route="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a href="#/crawl/new" class="nav-link" data-route="new-crawl">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          New Crawl
        </a>
        <a href="#/search" class="nav-link" data-route="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </a>
      </div>
      <div class="nav-status" id="nav-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
    </nav>

    <main id="main-content" class="main-content"></main>
  </div>

  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/router.js"></script>
  <script src="/frontend/js/components.js"></script>
  <script src="/frontend/js/pages/dashboard.js"></script>
  <script src="/frontend/js/pages/new-crawl.js"></script>
  <script src="/frontend/js/pages/job-detail.js"></script>
  <script src="/frontend/js/pages/search.js"></script>
  <script src="/frontend/js/app.js"></script>
</body>
</html>
